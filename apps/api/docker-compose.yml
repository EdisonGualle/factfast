version: '3.9'

services:
  # Base de datos principal
  postgres:
    image: postgres:16-alpine
    container_name: facturacion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-facturacion}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-facturacion_pass}
      POSTGRES_DB: ${DB_NAME:-facturacion_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U facturacion']
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache y colas BullMQ
  redis:
    image: redis:7-alpine
    container_name: facturacion_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Almacenamiento S3-compatible (XMLs y PDFs)
  minio:
    image: minio/minio:latest
    container_name: facturacion_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
